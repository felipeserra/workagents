name: Deploy Frontend
on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend/**'
      - '!**.md'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & Build
        run: |
          cd apps/frontend
          npm install
          npm run build
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd apps/frontend
          npx vercel deploy --yes --token="$VERCEL_TOKEN" --prod
