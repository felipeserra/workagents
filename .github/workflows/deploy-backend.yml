name: Deploy Backend
on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - '!**.md'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build
        run: cd apps/backend && go build ./...
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: prj_izG51izOTKLsvGuXJUT3vcf3wPV5
        run: |
          cd apps/backend
          npx vercel link --project workagents-api --yes --token="$VERCEL_TOKEN" --scope="$VERCEL_ORG_ID"
          npx vercel deploy --prod --token="$VERCEL_TOKEN"
