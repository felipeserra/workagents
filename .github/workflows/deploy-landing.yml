name: Deploy Landing
on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - '!**.md'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          cd apps/landing
          npx vercel deploy --yes --token="$VERCEL_TOKEN" --prod
